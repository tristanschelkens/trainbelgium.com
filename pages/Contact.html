<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - trainbelgium.com</title>

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link
      rel="icon"
      type="image/png"
      href="../images/favicon-32x32.png"
      sizes="32x32"
    />
    <link
      rel="icon"
      type="image/png"
      href="../images//favicon-16x16.png"
      sizes="16x16"
    />
    <link rel="apple-touch-icon" href="../images//apple-touch-icon.png" />

    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="../images//icon-512.png"
    />

    <link rel="stylesheet" href="../css/style.css" />
    <script
      src="https://kit.fontawesome.com/9332905c2e.js"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="navbar"></div>

    <section class="section">
      <h1 style="margin-bottom: 10px">Contact</h1>
      <p style="opacity: 0.85">Feel free to message me.</p>

      <div class="contact-grid">
        <div class="contact-card">
          <i class="fas fa-map-marker-alt"></i>
          <h3>Herentals</h3>
          <p>Antwerp, Belgium</p>
        </div>

        <div class="contact-card">
          <i class="fas fa-envelope"></i>
          <h3>info@trainbelgium.com</h3>
          <p>Email me your query</p>
        </div>
      </div>

      <div style="margin-top: 22px; text-align: center">
        <a class="hero-btn" href="https://www.instagram.com/trainbelgium"
          >Instagram</a
        >
      </div>
    </section>

    <div id="footer"></div>

    <script src="../js/loadComponents.js"></script>
    <script src="../js/script.js"></script>
  </body>
</html>
