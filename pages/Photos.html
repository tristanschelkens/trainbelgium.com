<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photos - trainbelgium.com</title>

    <link rel="stylesheet" href="../css/style.css" />
    <script
      src="https://kit.fontawesome.com/9332905c2e.js"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="navbar"></div>

    <div class="container page-title">
      <h1>Photos</h1>
      <p>A selection of trainspotting locations.</p>
    </div>

    <section class="container section" style="padding-top: 18px">
      <h2>Belgium</h2>

      <div class="photo-grid">
        <div class="photo-card">
          <img src="../images/Belgium/Antwerp.JPG" alt="Antwerp" />
          <div class="overlay"><h3>Antwerp</h3></div>
        </div>

        <div class="photo-card">
          <img src="../images/Belgium/Brussels.jpg" alt="Brussels" />
          <div class="overlay"><h3>Brussels</h3></div>
        </div>

        <div class="photo-card">
          <img src="../images/Belgium/Liege.JPG" alt="Liege" />
          <div class="overlay"><h3>Liege</h3></div>
        </div>

        <div class="photo-card">
          <img src="../images/Belgium/Mechelen.JPG" alt="Mechelen" />
          <div class="overlay"><h3>Mechelen</h3></div>
        </div>
      </div>
    </section>

    <div id="footer"></div>

    <script src="../js/loadComponents.js"></script>
    <script src="../js/script.js"></script>
  </body>
</html>
