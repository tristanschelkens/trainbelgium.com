<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photos - trainbelgium.com</title>

    <link
      rel="icon"
      type="image/png"
      href="../images/favicon-32x32.png"
      sizes="32x32"
    />
    <link
      rel="icon"
      type="image/png"
      href="../images//favicon-16x16.png"
      sizes="16x16"
    />
    <link rel="apple-touch-icon" href="../images//apple-touch-icon.png" />

    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="../images//icon-512.png"
    />

    <link rel="stylesheet" href="../css/style.css" />
    <script
      src="https://kit.fontawesome.com/9332905c2e.js"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="navbar"></div>

    <section class="section">
      <h1 style="margin-bottom: 10px">Photos</h1>
      <p style="opacity: 0.85; margin-bottom: 26px">
        A selection of trainspotting locations.
      </p>

      <section class="photo-section" style="padding: 0">
        <h2>Belgium</h2>

        <div class="photo-grid">
          <div class="photo-card">
            <img
              src="../images/Belgium/Central Station, Antwerp/Antwerp.JPG"
              alt="Antwerp"
            />
            <div class="overlay"><h3>Antwerp</h3></div>
          </div>

          <div class="photo-card">
            <img
              src="../images/Belgium/Brussels-Midi, Brussels/Brussels.jpg"
              alt="Brussels"
            />
            <div class="overlay"><h3>Brussels</h3></div>
          </div>

          <div class="photo-card">
            <img
              src="../images/Belgium/Liege-Guillemins, Liege/IMG_3139.JPEG"
              alt="Liege"
            />
            <div class="overlay"><h3>Liege</h3></div>
          </div>

          <div class="photo-card">
            <img
              src="../images/Belgium/Mechelen, Antwerp/IMG_5983.JPEG"
              alt="Mechelen"
            />
            <div class="overlay"><h3>Mechelen</h3></div>
          </div>

          <div class="photo-card">
            <img
              src="../images/Belgium/Duffel, Antwerp/image.png"
              alt="Duffel"
            />
            <div class="overlay"><h3>Duffel</h3></div>
          </div>
        </div>
      </section>
    </section>

    <div id="footer"></div>

    <script src="../js/loadComponents.js"></script>
    <script src="../js/script.js"></script>
  </body>
</html>
