<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photos - trainbelgium.com</title>

    <link rel="stylesheet" href="../css/style.css" />
    <script
      src="https://kit.fontawesome.com/9332905c2e.js"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      href="../images/favicon-32x32.png"
      sizes="32x32"
    />
    <link
      rel="icon"
      type="image/png"
      href="../images//favicon-16x16.png"
      sizes="16x16"
    />
    <link rel="apple-touch-icon" href="../images//apple-touch-icon.png" />

    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="../images//icon-512.png"
    />
  </head>

  <body>
    <div id="navbar"></div>

    <main>
      <div class="container page-title">
        <h1>Photos</h1>
        <p>A selection of trainspotting locations.</p>
      </div>

      <div class="container" style="padding-bottom: 10px">
        <div class="filters" id="photoFilters">
          <button class="filter-btn active" type="button" data-filter="all">
            All
          </button>

          <button class="filter-btn" type="button" data-filter="belgium">
            Belgium
          </button>

          <button class="filter-btn" type="button" data-filter="france">
            France
          </button>

          <button class="filter-btn" type="button" data-filter="germany">
            Germany
          </button>

          <button class="filter-btn" type="button" data-filter="luxembourg">
            Luxembourg
          </button>

          <button class="filter-btn" type="button" data-filter="netherlands">
            Netherlands
          </button>

          <button class="filter-btn" type="button" data-filter="united kingdom">
            United Kingdom
          </button>
        </div>
      </div>

      <section class="container section" style="padding-top: 18px">
        <h2>Gallery</h2>

        <div class="photo-grid" id="photoGrid">
          <!-- BELGIUM -->

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Antwerp/Antwerp.JPG"
              alt="Antwerp"
            />
            <div class="overlay"><h3>Antwerp</h3></div>
          </div>

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Brussels-Midi/Brussels.jpg"
              alt="Brussels"
            />
            <div class="overlay"><h3>Brussels</h3></div>
          </div>

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Duffel/Duffel.png"
              alt="Duffel"
            />
            <div class="overlay"><h3>Duffel</h3></div>
          </div>

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Leuven/Leuven.jpeg"
              alt="Leuven"
            />
            <div class="overlay"><h3>Leuven</h3></div>
          </div>

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Liege/Luik.png"
              alt="Liège"
            />
            <div class="overlay"><h3>Liège</h3></div>
          </div>

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Lier/Lier.png"
              alt="Lier"
            />
            <div class="overlay"><h3>Lier</h3></div>
          </div>

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Luchtbal/Luchtbal.png"
              alt="Luchtbal"
            />
            <div class="overlay"><h3>Luchtbal</h3></div>
          </div>

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Mechelen/Mechelen.jpeg"
              alt="Mechelen"
            />
            <div class="overlay"><h3>Mechelen</h3></div>
          </div>

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Schaerbeek/Schaerbeek.jpeg"
              alt="Schaerbeek"
            />
            <div class="overlay"><h3>Schaerbeek</h3></div>
          </div>

          <!-- FRANCE -->

          <div class="photo-card" data-country="france">
            <img
              loading="lazy"
              src="../images/France/Paris/Paris.JPG"
              alt="Paris"
            />
            <div class="overlay"><h3>Paris</h3></div>
          </div>

          <!-- GERMANY -->

          <div class="photo-card" data-country="germany">
            <img
              loading="lazy"
              src="../images/Germany/Aachen/Aachen.jpg"
              alt="Aachen"
            />
            <div class="overlay"><h3>Aachen</h3></div>
          </div>

          <div class="photo-card" data-country="germany">
            <img
              loading="lazy"
              src="../images/Germany/Dusseldorf/Dusseldorf.jpeg"
              alt="Düsseldorf"
            />
            <div class="overlay"><h3>Düsseldorf</h3></div>
          </div>

          <!-- LUXEMBOURG -->

          <div class="photo-card" data-country="luxembourg">
            <img
              loading="lazy"
              src="../images/Luxembourg/Luxembourg/Luxembourg.jpeg"
              alt="Luxembourg"
            />
            <div class="overlay"><h3>Luxembourg</h3></div>
          </div>

          <!-- NETHERLANDS -->

          <div class="photo-card" data-country="netherlands">
            <img
              loading="lazy"
              src="../images/Netherlands/Roosendaal/Roosendaal.jpeg"
              alt="Roosendaal"
            />
            <div class="overlay"><h3>Roosendaal</h3></div>
          </div>

          <!-- LONDON -->

          <div class="photo-card" data-country="united kingdom">
            <img
              loading="lazy"
              src="../images/United Kingdom/London/London.jpeg"
              alt="London"
            />
            <div class="overlay"><h3>London</h3></div>
          </div>
        </div>

        <p class="no-results" id="noResults" style="display: none">
          No photos found in this category (yet).
        </p>
      </section>
    </main>

    <div id="footer"></div>

    <script src="../js/loadComponents.js"></script>
    <script src="../js/script.js"></script>
  </body>
</html>
