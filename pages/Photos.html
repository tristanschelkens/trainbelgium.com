<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photos - trainbelgium.com</title>

    <link rel="stylesheet" href="../css/style.css" />
    <script
      src="https://kit.fontawesome.com/9332905c2e.js"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      href="../images/favicon-32x32.png"
      sizes="32x32"
    />
    <link
      rel="icon"
      type="image/png"
      href="../images//favicon-16x16.png"
      sizes="16x16"
    />
    <link rel="apple-touch-icon" href="../images//apple-touch-icon.png" />

    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="../images//icon-512.png"
    />
  </head>

  <body>
    <div id="navbar"></div>

    <main>
      <div class="container page-title">
        <h1>Photos</h1>
        <p>A selection of trainspotting locations.</p>
      </div>

      <div class="container" style="padding-bottom: 10px">
        <div class="filters" id="photoFilters">
          <button class="filter-btn active" type="button" data-filter="all">
            All
          </button>

          <button class="filter-btn" type="button" data-filter="belgium">
            Belgium
          </button>

          <button class="filter-btn" type="button" data-filter="germany">
            Germany
          </button>

          <button class="filter-btn" type="button" data-filter="france">
            France
          </button>
        </div>
      </div>

      <section class="container section" style="padding-top: 18px">
        <h2>Gallery</h2>

        <div class="photo-grid" id="photoGrid">
          <!-- BELGIUM -->

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Brussels-Midi, Brussels/Brussels.jpg"
              alt="Brussels"
            />
            <div class="overlay"><h3>Brussels</h3></div>
          </div>

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Liege-Guillemins, Liege/IMG_3139.JPEG"
              alt="Liège"
            />
            <div class="overlay"><h3>Liege</h3></div>
          </div>

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Mechelen, Antwerp/IMG_5983.JPEG"
              alt="Mechelen"
            />
            <div class="overlay"><h3>Mechelen</h3></div>
          </div>

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Duffel, Antwerp/image.png"
              alt="Duffel"
            />
            <div class="overlay"><h3>Duffel</h3></div>
          </div>

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Leuven, Flemish Brabant/IMG_5974.JPEG"
              alt="Leuven"
            />
            <div class="overlay"><h3>Leuven</h3></div>
          </div>

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Lier, Antwerp/Lier.png"
              alt="Lier"
            />
            <div class="overlay"><h3>Lier</h3></div>
          </div>

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Lokeren, East Flanders/IMG_4813.JPEG"
              alt="Lokeren"
            />
            <div class="overlay"><h3>Lokeren</h3></div>
          </div>

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Luchtbal, Antwerp/image.png"
              alt="Luchtbal"
            />
            <div class="overlay"><h3>Luchtbal</h3></div>
          </div>

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Mechelen, Antwerp/IMG_5983.JPEG"
              alt="Mechelen"
            />
            <div class="overlay"><h3>Mechelen</h3></div>
          </div>

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Nijlen, Antwerp/IMG_5293.JPEG"
              alt="Nijlen"
            />
            <div class="overlay"><h3>Nijlen</h3></div>
          </div>

          <div class="photo-card" data-country="belgium">
            <img
              loading="lazy"
              src="../images/Belgium/Sint Pieters, Ghent/IMG_4407.JPEG"
              alt="Ghent"
            />
            <div class="overlay"><h3>Ghent</h3></div>
          </div>

          <!-- GERMANY -->

          <div class="photo-card" data-country="germany">
            <img
              loading="lazy"
              src="../images/Germany/Aachen Hbf, Aachen/IMG_4033.jpg"
              alt="Aachen"
            />
            <div class="overlay"><h3>Aachen</h3></div>
          </div>

          <!-- FRANCE -->

          <div class="photo-card" data-country="france">
            <img
              loading="lazy"
              src="../images/France/Gare de l'Es, Paris/IMG_2901.JPG"
              alt="Paris"
            />
            <div class="overlay"><h3>Paris</h3></div>
          </div>
        </div>

        <p class="no-results" id="noResults" style="display: none">
          No photos found in this category (yet).
        </p>
      </section>
    </main>

    <div id="footer"></div>

    <script src="../js/loadComponents.js"></script>
    <script src="../js/script.js"></script>
  </body>
</html>
